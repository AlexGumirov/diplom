{% extends "monitoring/base.html" %}

{% block content %}
<section class="san-phone">
    <div class="san-header">
        <a class="san-back" href="/">Назад</a>
        <div>
            <p class="eyebrow">Тест завершен</p>
            <h2>Результаты САН</h2>
        </div>
    </div>

    <article class="san-card result-card">
        {% for item in result_items %}
            <div class="result-row">
                <div>
                    <span>{{ item.label }}</span>
                    <strong>{{ item.score }}</strong>
                </div>
                <em>{{ item.interpretation }}</em>
            </div>
        {% endfor %}
    </article>

    <a class="primary-button san-submit" href="{% url 'san-start' %}">Пройти тест заново</a>
</section>
{% endblock %}
