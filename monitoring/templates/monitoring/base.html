{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} | Athlete Monitoring</title>
    <link rel="stylesheet" href="{% static 'monitoring/css/app.css' %}">
</head>
<body data-page="{{ page }}">
    <div class="shell">
        <aside class="sidebar">
            <a class="brand" href="/">
                <span class="brand-mark">AM</span>
                <span>
                    <strong>Athlete Monitor</strong>
                    <small>состояние спортсмена</small>
                </span>
            </a>

            <nav class="nav">
                <a class="{% if page == 'dashboard' %}active{% endif %}" href="/">Панель</a>
                <a class="{% if page == 'athletes' %}active{% endif %}" href="/athletes/">Спортсмены</a>
                <a class="{% if page == 'records' %}active{% endif %}" href="/records/">Дневники</a>
                <a class="{% if page == 'physical' %}active{% endif %}" href="/physical/">Физика</a>
                <a class="{% if page == 'psychological' %}active{% endif %}" href="/psychological/">Психология</a>
                <a class="{% if page == 'analysis' %}active{% endif %}" href="/analysis/">Аналитика</a>
                <a class="{% if page == 'san' %}active{% endif %}" href="/san/start/">Тест САН</a>
            </nav>

            <div class="sidebar-note">
                <span class="dot"></span>
                <span>API доступно на <a href="/api/">/api/</a></span>
            </div>
        </aside>

        <main class="content">
            <header class="topbar">
                <div>
                    <p class="eyebrow">Система мониторинга</p>
                    <h1>{{ title }}</h1>
                </div>
                <div class="status-pill" id="connectionStatus">Готово</div>
            </header>

            {% block content %}{% endblock %}
        </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="{% static 'monitoring/js/app.js' %}"></script>
</body>
</html>
