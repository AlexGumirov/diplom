{% extends "monitoring/base.html" %}

{% block content %}
<section class="san-phone">
    <div class="san-header">
        <a class="san-back" href="/">Назад</a>
        <div>
            <p class="eyebrow">Тест САН</p>
            <h2>Вопрос {{ question.number }} из {{ question_count }} ({{ progress }}%)</h2>
        </div>
    </div>

    <div class="san-progress" aria-label="Прогресс теста">
        <span style="width: {{ progress }}%"></span>
    </div>

    <article class="san-card">
        <div class="san-poles">
            <strong>{{ question.left_text }}</strong>
            <strong>{{ question.right_text }}</strong>
        </div>

        <form method="post" class="san-form" id="sanForm">
            {% csrf_token %}
            <div class="san-scale" role="radiogroup" aria-label="Выбор ответа">
                {% for item in scale %}
                    <label class="san-option">
                        <input type="radio" name="value" value="{{ item.value }}" required>
                        <span>{{ item.label }}</span>
                    </label>
                {% endfor %}
            </div>
            <button class="primary-button san-submit" type="submit">Ответить</button>
        </form>
    </article>
</section>
{% endblock %}
